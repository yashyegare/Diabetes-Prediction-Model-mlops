apiVersion: apps/v1
kind: Deployment
metadata:
  name: diabetes-api
  labels:
    app: diabetes-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diabetes-api
  template:
    metadata:
      labels:
        app: diabetes-api
    spec:
      containers:
      - name: diabetes-api
        image: yashyegare/diabetes-api:latestv1
        ports:
        - containerPort: 8000
        imagePullPolicy: Always
        # In your existing k8s-deploy.yml Service section, ensure this:
        spec:
          selector:
            app: diabetes-prediction
          ports:
            - name: http          # ← add this name
              port: 8000
              targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: diabetes-api-service
spec:
  selector:
    app: diabetes-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
